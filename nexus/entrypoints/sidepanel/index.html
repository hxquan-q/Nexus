<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus</title>
  <style>
    body { margin: 0; background: var(--color-bg-primary, #fff); }
    .loading-skeleton {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100vh; gap: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #86868b;
    }
    .loading-skeleton .spinner {
      width: 24px; height: 24px; border: 3px solid #e8e8ed;
      border-top-color: #007aff; border-radius: 50%;
      animation: nexus-spin 0.8s linear infinite;
    }
    @keyframes nexus-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading-skeleton">
      <div class="spinner"></div>
      <div>Loading Nexus...</div>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
